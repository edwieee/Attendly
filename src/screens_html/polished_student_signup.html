<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Student Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#d4d4db",
              "on-error": "#fff7f6",
              "surface-tint": "#005ac2",
              "on-primary-container": "#004eaa",
              "inverse-surface": "#0c0f10",
              "on-surface-variant": "#586064",
              "on-primary-fixed-variant": "#0057bd",
              "primary-container": "#d8e2ff",
              "surface-container-low": "#f1f4f6",
              "surface-container": "#eaeff1",
              "on-secondary": "#f9f8ff",
              "inverse-on-surface": "#9b9d9e",
              "secondary-fixed": "#e2e2e9",
              "on-primary-fixed": "#003c86",
              "on-error-container": "#752121",
              "primary-dim": "#004fab",
              "on-secondary-fixed-variant": "#5a5b61",
              "surface-container-high": "#e2e9ec",
              "primary-fixed": "#d8e2ff",
              "on-tertiary-container": "#47445f",
              "secondary": "#5e5f65",
              "surface-variant": "#dbe4e7",
              "error": "#9f403d",
              "on-secondary-container": "#505157",
              "error-container": "#fe8983",
              "outline": "#737c7f",
              "error-dim": "#4e0309",
              "surface-container-highest": "#f1f5f9",
              "on-surface": "#2b3437",
              "on-primary": "#f7f7ff",
              "primary-fixed-dim": "#c3d4ff",
              "outline-variant": "#e2e8f0",
              "on-tertiary-fixed-variant": "#504e69",
              "background": "#f8fafc",
              "tertiary-container": "#d3ceef",
              "tertiary": "#5f5c78",
              "surface-container-lowest": "#ffffff",
              "secondary-dim": "#515359",
              "surface": "#f8fafc",
              "inverse-primary": "#4d8eff",
              "on-tertiary": "#fcf7ff",
              "secondary-container": "#e2e2e9",
              "tertiary-fixed": "#d3ceef",
              "surface-dim": "#d1dce0",
              "on-secondary-fixed": "#3e3f45",
              "tertiary-dim": "#53506b",
              "on-background": "#0f172a",
              "surface-bright": "#f8fafc",
              "primary": "#3B82F6",
              "tertiary-fixed-dim": "#c5c0e0",
              "on-tertiary-fixed": "#34314b"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
            boxShadow: {
              'premium': '0 20px 50px -12px rgba(15, 23, 42, 0.08)',
              'input-focus': '0 0 0 4px rgba(59, 130, 246, 0.12)',
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .mesh-bg {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.03) 0px, transparent 50%);
      }
      .glass-card {
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
    </style>
</head>
<body class="mesh-bg font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Main Container -->
<main class="w-full max-w-md relative z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary mb-6 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="fingerprint">fingerprint</span>
</div>
<h1 class="font-headline font-extrabold text-3xl text-on-background tracking-tight">Student Portal</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Precision Attendance Tracking</p>
</div>
<!-- Signup Card -->
<div class="bg-surface-container-lowest rounded-2xl shadow-premium p-8 lg:p-10 glass-card">
<header class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-background">Create Account</h2>
<p class="text-on-surface-variant text-sm mt-1">Join the digital attendance ecosystem today.</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant px-1" for="full_name">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary" data-icon="person">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-highest border border-transparent rounded-xl focus:ring-0 focus:border-primary/30 focus:bg-white focus:shadow-input-focus transition-all text-sm placeholder:text-outline/70" id="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-highest border border-transparent rounded-xl focus:ring-0 focus:border-primary/30 focus:bg-white focus:shadow-input-focus transition-all text-sm placeholder:text-outline/70" id="email" placeholder="student@university.edu" type="email"/>
</div>
</div>
<!-- Passwords -->
<div class="grid grid-cols-1 gap-6">
<!-- Password -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant px-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-highest border border-transparent rounded-xl focus:ring-0 focus:border-primary/30 focus:bg-white focus:shadow-input-focus transition-all text-sm placeholder:text-outline/70" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant px-1" for="confirm_password">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary" data-icon="verified_user">verified_user</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-highest border border-transparent rounded-xl focus:ring-0 focus:border-primary/30 focus:bg-white focus:shadow-input-focus transition-all text-sm placeholder:text-outline/70" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-8 text-center border-t border-slate-100 pt-6">
<p class="text-on-surface-variant text-sm font-medium">
                    Already have an account? 
                    <a class="text-primary font-bold hover:text-primary/80 transition-colors ml-1" href="#">Sign In</a>
</p>
</footer>
</div>
<!-- Secondary Info -->
<div class="mt-10 flex justify-center gap-8">
<a class="text-xs font-semibold text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs font-semibold text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-xs font-semibold text-outline hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</main>
<!-- Illustrative Footer Line -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</body></html>
