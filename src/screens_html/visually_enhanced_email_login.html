<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Portal | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#3e3f45",
              "surface-container-high": "#e2e9ec",
              "error-container": "#fe8983",
              "surface-tint": "#005ac2",
              "on-secondary-container": "#505157",
              "surface-container": "#eaeff1",
              "on-background": "#2b3437",
              "inverse-primary": "#4d8eff",
              "surface-container-lowest": "#ffffff",
              "surface": "#f8f9fa",
              "on-secondary": "#f9f8ff",
              "tertiary-fixed": "#d3ceef",
              "on-primary-fixed-variant": "#0057bd",
              "inverse-on-surface": "#9b9d9e",
              "on-error-container": "#752121",
              "on-error": "#fff7f6",
              "outline": "#737c7f",
              "primary-container": "#d8e2ff",
              "surface-container-low": "#f1f4f6",
              "primary-fixed-dim": "#c3d4ff",
              "on-tertiary-fixed-variant": "#504e69",
              "secondary-dim": "#515359",
              "secondary-fixed": "#e2e2e9",
              "on-tertiary-fixed": "#34314b",
              "error-dim": "#4e0309",
              "on-primary-container": "#004eaa",
              "error": "#9f403d",
              "secondary-fixed-dim": "#d4d4db",
              "secondary": "#5e5f65",
              "on-secondary-fixed-variant": "#5a5b61",
              "primary-dim": "#004fab",
              "inverse-surface": "#0c0f10",
              "outline-variant": "#abb3b7",
              "on-tertiary": "#fcf7ff",
              "surface-dim": "#d1dce0",
              "tertiary-dim": "#53506b",
              "tertiary-container": "#d3ceef",
              "on-primary": "#f7f7ff",
              "primary-fixed": "#d8e2ff",
              "on-surface-variant": "#586064",
              "tertiary": "#5f5c78",
              "surface-variant": "#dbe4e7",
              "on-primary-fixed": "#003c86",
              "surface-container-highest": "#dbe4e7",
              "tertiary-fixed-dim": "#c5c0e0",
              "primary": "#005ac2",
              "on-surface": "#2b3437",
              "background": "#f8f9fa",
              "secondary-container": "#e2e2e9",
              "on-tertiary-container": "#47445f",
              "surface-bright": "#f8f9fa"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.08) 0%, #f8f9fa 100%);
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .input-inset {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex items-center justify-center p-6 selection:bg-primary/10">
<!-- Auth Background Elements -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[50%] h-[50%] rounded-full bg-tertiary-container/10 blur-[100px]"></div>
</div>
<!-- Auth Container -->
<main class="w-full max-w-[480px]">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-12">
<div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center mb-5 shadow-[0_12px_24px_-8px_rgba(0,90,194,0.3)]">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="text-3xl font-extrabold tracking-[-0.03em] text-primary" style="letter-spacing: -0.02em;">Student Portal</h1>
<p class="text-on-surface-variant font-medium mt-1.5 text-sm">Precision Attendance Tracking</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-2xl shadow-[0_32px_80px_-16px_rgba(0,0,0,0.08)] overflow-hidden">
<div class="p-10 md:p-12">
<div class="mb-10">
<h2 class="text-2xl font-bold text-on-background mb-2.5 tracking-tight" style="letter-spacing: -0.01em;">Welcome back</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Please enter your credentials to access your dashboard.</p>
</div>
<form action="#" class="space-y-7">
<!-- Email Field -->
<div class="space-y-2.5">
<label class="text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant/80 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/70 text-lg group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface-container-low/50 border-transparent rounded-xl focus:bg-white focus:ring-0 focus:border-primary/40 border-2 transition-all text-on-background placeholder:text-outline/40 text-[15px] input-inset" id="email" name="email" placeholder="name@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant/80" for="password">Password</label>
<a class="text-[11px] font-bold text-primary hover:text-primary-dim transition-colors uppercase tracking-wider" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/70 text-lg group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-4 bg-surface-container-low/50 border-transparent rounded-xl focus:bg-white focus:ring-0 focus:border-primary/40 border-2 transition-all text-on-background placeholder:text-outline/40 text-[15px] input-inset" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline/60 hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-4.5 bg-primary text-on-primary font-bold rounded-xl shadow-[0_8px_20px_-4px_rgba(0,90,194,0.3)] hover:shadow-[0_12px_28px_-4px_rgba(0,90,194,0.4)] hover:bg-primary-dim active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-2" type="submit">
<span class="text-[15px]">Sign In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="bg-surface-container-low/40 p-7 text-center border-t border-white/40">
<p class="text-on-surface-variant text-sm font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1.5" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Secondary Context -->
<div class="mt-10 flex flex-wrap justify-center gap-8 text-[11px] text-on-surface-variant/60 font-bold uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</main>
<!-- Visual Polish: Corner Status -->
<div class="fixed top-8 right-8 hidden lg:block">
<div class="flex items-center gap-3 bg-white/60 backdrop-blur-md px-5 py-2.5 rounded-full border border-white shadow-sm">
<div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
<span class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-surface-variant">System Online</span>
</div>
</div>
</body></html>
